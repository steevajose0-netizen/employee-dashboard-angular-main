<div class="list-container">
  <div class="header-actions">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filter by Department</mat-label>
      <input matInput [(ngModel)]="filterDepartment" placeholder="e.g. Engineering">
    </mat-form-field>
  </div>

  <mat-card>
    <table mat-table [dataSource]="employees | departmentFilter:filterDepartment" class="mat-elevation-z8 employee-table">
      
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let emp"> {{emp.id}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let emp"> {{emp.name}} </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let emp"> {{emp.role}} </td>
      </ng-container>

      <!-- Department Column -->
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef> Department </th>
        <td mat-cell *matCellDef="let emp"> {{emp.department}} </td>
      </ng-container>

      <!-- Salary Column -->
      <ng-container matColumnDef="salary">
        <th mat-header-cell *matHeaderCellDef> Salary </th>
        <td mat-cell *matCellDef="let emp" [appHighSalary]="emp.salary"> 
          {{emp.salary | currency:'USD':'symbol':'1.0-0'}} 
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let emp">
          <button mat-icon-button color="primary" (click)="viewDetails(emp.id)" title="View Details">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="editEmployee(emp.id)" title="Edit Employee">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteEmployee(emp.id)" title="Delete Employee">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6">No employees found matching filter "{{filterDepartment}}"</td>
      </tr>
    </table>
  </mat-card>
</div>
